name: Build

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LICENSE'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LICENSE'
      - '.github/workflows/deploy-docs.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Build shadow jar
        run: |
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon

      - name: Get version and commit info
        id: meta
        run: |
          VERSION=$(./gradlew properties -q --no-daemon | grep "^version:" | awk '{print $2}')
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: SmartSpawner-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}
          path: build/libs/SmartSpawner-*.jar
          if-no-files-found: error
          retention-days: 30
